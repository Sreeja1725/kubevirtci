# DKMS configuration for fake-nvidia-pci
#
# Install with DKMS:
#   sudo cp -r fake-nvidia-pci /usr/src/fake-nvidia-pci-1.0
#   sudo dkms add -m fake-nvidia-pci -v 1.0
#   sudo dkms build -m fake-nvidia-pci -v 1.0
#   sudo dkms install -m fake-nvidia-pci -v 1.0
#
# Remove:
#   sudo dkms remove -m fake-nvidia-pci -v 1.0 --all

PACKAGE_NAME="fake-nvidia-pci"
PACKAGE_VERSION="1.0"

BUILT_MODULE_NAME[0]="fake-nvidia-pci"
DEST_MODULE_LOCATION[0]="/extra"

AUTOINSTALL="yes"
